<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <meta
      name="description"
      content="News aggregator app built with react and webpack"
    />
    <!-- MEDIUM: Content Security Policy meta tag for additional security -->
    <!-- Note: frame-ancestors removed - only works via HTTP headers (configured in netlify.toml) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      connect-src 'self';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    ">
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
